name: portfolio

on: 
    push: 
        branches: [main]
    workflow_dispatch:

permissions: 
    pages: write
    id-token: write
    contents: read

jobs:
    deploy:
        runs-on: ubuntu-latest

        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}


# get access to ur portfolio via pre built action
# clones or check out the code where this workflow is written
        steps:
            - name: checkout code 
              uses: actions/checkout@v4
# setup github pages 
            - name: setup github pages
              uses: actions/configure-pages@v4
# static code artifacts
            - name: upload static files
              uses: actions/upload-pages-artifact@v4
              with:
                path: "."

            - name: Deploy to github pages
              uses: actions/deploy-pages@v4



        
